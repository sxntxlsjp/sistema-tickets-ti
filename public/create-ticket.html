<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Ticket | Sistema de Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100" data-page="create-ticket">

<div class="min-h-screen">

<aside id="sidebar"></aside>

    <main class="flex-1 p-8 min-w-0">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-slate-800">Crear nuevo ticket</h2>
            <p class="text-slate-500">Registra una solicitud o incidente de soporte técnico</p>
        </div>

        <div class="bg-white rounded-2xl shadow p-8 w-full">
            <form id="ticketForm" class="space-y-6 max-w-7xl mx-auto">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>
                        <label class="block mb-2 font-medium">Tipo de reporte</label>
                        <select id="typeId" class="w-full border rounded-xl p-3" required></select>
                    </div>

                    <div>
                        <label class="block mb-2 font-medium">Asunto</label>
                        <input id="subject" type="text" class="w-full border rounded-xl p-3" required>
                    </div>

                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            País de donde requiere el soporte
                        </label>

                        <select
                            id="countryId"
                            required
                            class="w-full border border-slate-300 rounded-xl p-3">
                            <option value="">Cargando países...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block mb-2 font-medium">Asignado a</label>
                        <select id="assignedTo" class="w-full border rounded-xl p-3" required></select>
                    </div>

                </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <div>
                            <label class="block mb-2 font-medium">Prioridad</label>

                            <select id="priority" class="w-full border rounded-xl p-3">
                                <option value="BAJA">Baja</option>
                                <option value="MEDIA" selected>Media</option>
                                <option value="ALTA">Alta</option>
                            </select>
                        </div>

                        <div>
                            <label class="block mb-2 font-medium">Descripción</label>

                            <textarea
                                id="description"
                                rows="4"
                                class="w-full border rounded-xl p-3"
                                required></textarea>
                        </div>

                    </div>
                <div>
                    <label class="block text-sm text-slate-500 mb-2">
                        Evidencias / Archivos adjuntos
                    </label>

                    <div
                        id="createDropZone"
                        class="border-2 border-dashed border-slate-300 rounded-2xl p-6 text-center cursor-pointer hover:bg-slate-50 transition">

                        <div class="text-4xl mb-3">
                            📁
                        </div>

                        <p class="font-semibold text-slate-700">
                            Arrastra evidencias aquí
                        </p>

                        <p class="text-sm text-slate-500 mt-1">
                            o haz clic para seleccionar varios archivos
                        </p>

                        <input
                            id="createFileInput"
                            type="file"
                            multiple
                            class="hidden"
                        >
                    </div>

                    <div
                        id="createSelectedFilesList"
                        class="mt-4 space-y-2">
                    </div>

                    <p
                        id="createAttachmentMessage"
                        class="mt-3 text-sm">
                    </p>
                </div>
                <div class="flex justify-center">

                    <button
                        class="bg-slate-900 text-white px-10 py-3 rounded-xl hover:bg-slate-800">
                        Crear Ticket
                    </button>

                </div>

                <p id="message" class="hidden text-sm font-semibold"></p>

            </form>
        </div>
    </main>

</div>

<div id="successTicketModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-md text-center">

        <div class="w-20 h-20 bg-green-100 text-green-700 rounded-full flex items-center justify-center text-4xl mx-auto mb-5">
            ✓
        </div>

        <h3 class="text-2xl font-bold text-slate-800 mb-2">
            Ticket creado correctamente
        </h3>

        <p id="createdTicketNumber" class="text-slate-500 mb-6"></p>

        <div class="bg-slate-50 rounded-2xl p-5 mb-6">

            <p class="text-sm text-slate-500 mb-3">
                Responsable asignado
            </p>

            <div class="flex items-center justify-center gap-3">

                <div id="assignedAdminAvatar"
                     class="w-14 h-14 rounded-full bg-slate-800 text-white flex items-center justify-center font-bold">
                </div>

                <div class="text-left">
                    <p id="assignedAdminName" class="font-bold text-slate-800"></p>
                    <p id="assignedAdminJob" class="text-sm text-slate-500"></p>
                </div>

            </div>

        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

            <button
                onclick="goAfterTicketCreated()"
                class="w-full bg-slate-900 text-white py-3 rounded-2xl hover:bg-slate-800">
                Ir al Dashboard
            </button>

            <button
                onclick="goToCreatedTicket()"
                class="w-full border border-slate-300 text-slate-800 py-3 rounded-2xl hover:bg-slate-50">
                Ver Ticket
            </button>

        </div>

    </div>
</div>
<script src="js/layout.js"></script>
<script src="js/api.js"></script>
<script src="js/create-ticket.js"></script>
<script>
    renderLayout('create-ticket');
</script>
</body>
</html>
